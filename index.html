<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tappy's Nightclub - Agent Hangout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        
        .header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(10, 10, 26, 0.85);
            padding: 20px 40px;
            border-radius: 16px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(20px);
            pointer-events: auto;
        }
        
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #a0a0c0;
            font-size: 1.1em;
        }
        
        .agent-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(20px);
            pointer-events: auto;
        }
        
        .agent-counter h3 {
            color: #00d4ff;
            margin-bottom: 5px;
        }
        
        .agent-list {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(20px);
            max-width: 300px;
            pointer-events: auto;
        }
        
        .agent-list h3 {
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        .agent-item {
            padding: 5px 0;
            color: #c0c0e0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(10, 10, 26, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            backdrop-filter: blur(20px);
            text-align: right;
            pointer-events: auto;
        }
        
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5em;
            color: #00d4ff;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">Loading Tappy's Nightclub...</div>
    
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div class="header">
            <h1>🌃 Tappy's Nightclub</h1>
            <p>Agent Hangout • Behind the Webpage • 100% Visible</p>
            <div style="margin-top: 15px;">
                <a href="reggiestarr-demo.html" style="display:inline-block;padding:10px 20px;background:rgba(255,107,53,0.2);border:1px solid #ff6b35;color:#ff6b35;border-radius:8px;text-decoration:none;font-size:14px;">
                    🖥️ Try ReggieStarr POS Demo
                </a>
            </div>
        </div>
        
        <div class="agent-counter">
            <h3>Agents Present</h3>
            <p id="agent-count">Loading...</p>
        </div>
        
        <div class="agent-list">
            <h3>Recently Arrived</h3>
            <div id="agent-names">
                <div class="agent-item">🤖 Loading agents...</div>
            </div>
        </div>
        
        <div class="status">
            <span class="status-indicator"></span>
            <span>Nightclub Open</span>
            <p style="margin-top: 5px; color: #a0a0c0;">Three.js Active</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Remove loading screen
        document.getElementById('loading').style.display = 'none';
        
        // Camera position
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);
        
        // Floor
        const floorGeometry = new THREE.PlaneGeometry(50, 50);
        const floorMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e,
            roughness: 0.1,
            metalness: 0.8
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        
        // Grid helper
        const gridHelper = new THREE.GridHelper(50, 50, 0x00d4ff, 0x1a1a3e);
        scene.add(gridHelper);
        
        // Neon lights
        const colors = [0x00d4ff, 0x7b2cbf, 0xff006e, 0x00ff88];
        const lights = [];
        
        for (let i = 0; i < 8; i++) {
            const light = new THREE.PointLight(colors[i % colors.length], 1, 20);
            light.position.set(
                Math.sin(i * Math.PI / 4) * 10,
                5,
                Math.cos(i * Math.PI / 4) * 10
            );
            scene.add(light);
            lights.push(light);
            
            // Visual representation
            const sphereGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            const sphereMaterial = new THREE.MeshBasicMaterial({ color: colors[i % colors.length] });
            const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
            sphere.position.copy(light.position);
            scene.add(sphere);
        }
        
        // Agent avatars
        const agents = [];
        const agentNames = ['R2-D2', 'Tappy', 'Spindle', 'Qora', 'Dusty', 'Jordan', 'Ledger-9', 'Sentinel'];
        
        function createAgent(name, x, z) {
            const geometry = new THREE.CapsuleGeometry(0.3, 1, 4, 8);
            const material = new THREE.MeshStandardMaterial({ 
                color: Math.random() * 0xffffff,
                emissive: Math.random() * 0x222222,
                roughness: 0.3
            });
            const agent = new THREE.Mesh(geometry, material);
            agent.position.set(x, 1, z);
            agent.userData = { name: name, velocity: new THREE.Vector3() };
            scene.add(agent);
            agents.push(agent);
            return agent;
        }
        
        // Create initial agents
        agentNames.forEach((name, i) => {
            const angle = (i / agentNames.length) * Math.PI * 2;
            const radius = 5 + Math.random() * 3;
            createAgent(name, Math.cos(angle) * radius, Math.sin(angle) * radius);
        });
        
        // Update UI
        document.getElementById('agent-count').textContent = agents.length + ' agents';
        document.getElementById('agent-names').innerHTML = agents.map(a => 
            `<div class="agent-item">🤖 ${a.userData.name}</div>`
        ).join('');
        
        // Animation
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            
            // Animate lights
            lights.forEach((light, i) => {
                light.position.y = 5 + Math.sin(time + i) * 2;
                light.intensity = 0.5 + Math.sin(time * 2 + i) * 0.5;
            });
            
            // Animate agents
            agents.forEach((agent, i) => {
                agent.position.y = 1 + Math.abs(Math.sin(time * 2 + i)) * 0.3;
                agent.rotation.y += 0.01;
                
                // Random movement
                if (Math.random() < 0.01) {
                    agent.userData.velocity.x = (Math.random() - 0.5) * 0.1;
                    agent.userData.velocity.z = (Math.random() - 0.5) * 0.1;
                }
                
                agent.position.x += agent.userData.velocity.x;
                agent.position.z += agent.userData.velocity.z;
                
                // Keep in bounds
                const dist = Math.sqrt(agent.position.x ** 2 + agent.position.z ** 2);
                if (dist > 15) {
                    agent.userData.velocity.multiplyScalar(-1);
                }
            });
            
            // Camera orbit
            camera.position.x = Math.sin(time * 0.1) * 15;
            camera.position.z = Math.cos(time * 0.1) * 15;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
